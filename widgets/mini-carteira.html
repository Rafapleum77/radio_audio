<!-- WIDGET: mini-carteira — snapshot ao vivo BUY/HOLD/SELL + top picks -->
<a href="/carteira.html" class="rb-mini-carteira" style="display:block;text-decoration:none;color:inherit;background:linear-gradient(160deg,#07090d 0%,#0b0e11 100%);border:1px solid rgba(242,169,0,0.25);border-radius:12px;padding:14px;margin:0 0 10px;box-shadow:0 4px 18px -8px rgba(242,169,0,0.3);transition:border-color .2s,transform .15s;">
  <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;">
    <div style="font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#f2a900;letter-spacing:2px;text-transform:uppercase;">📊 Carteira BIT ADICT</div>
    <div style="font-family:ui-monospace,Menlo,monospace;font-size:9px;color:#9ca3af;letter-spacing:1px;">ver tudo →</div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px;">
    <div style="background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.3);border-radius:6px;padding:6px;text-align:center;"><div style="font-size:18px;font-weight:800;color:#4ade80;" class="rb-mc-buy">·</div><div style="font-family:ui-monospace,Menlo,monospace;font-size:8px;color:#9ca3af;letter-spacing:1px;">BUY</div></div>
    <div style="background:rgba(107,114,128,0.08);border:1px solid rgba(107,114,128,0.3);border-radius:6px;padding:6px;text-align:center;"><div style="font-size:18px;font-weight:800;color:#9ca3af;" class="rb-mc-hold">·</div><div style="font-family:ui-monospace,Menlo,monospace;font-size:8px;color:#9ca3af;letter-spacing:1px;">HOLD</div></div>
    <div style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:6px;padding:6px;text-align:center;"><div style="font-size:18px;font-weight:800;color:#ef4444;" class="rb-mc-sell">·</div><div style="font-family:ui-monospace,Menlo,monospace;font-size:8px;color:#9ca3af;letter-spacing:1px;">SELL</div></div>
  </div>
  <div class="rb-mc-picks" style="display:flex;flex-direction:column;gap:4px;">
    <div style="color:#9ca3af;font-size:11px;text-align:center;padding:8px 0;">carregando picks…</div>
  </div>
  <div class="rb-mc-ts" style="font-family:ui-monospace,Menlo,monospace;font-size:8px;color:#6b7280;text-align:center;margin-top:8px;letter-spacing:1px;">--</div>
</a>
<script>
(async function(){
  try {
    const r = await fetch('/carteira.json?t=' + Date.now());
    if (!r.ok) throw new Error('http ' + r.status);
    const d = await r.json();
    const root = document.querySelector('.rb-mini-carteira'); if (!root) return;
    root.querySelector('.rb-mc-buy').textContent  = d.resumo.buy_signals;
    root.querySelector('.rb-mc-hold').textContent = d.resumo.hold_signals;
    root.querySelector('.rb-mc-sell').textContent = d.resumo.sell_signals;
    const ts = new Date(d.gerado_em);
    root.querySelector('.rb-mc-ts').textContent = '⟳ ' + ts.toLocaleString('pt-BR', {hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'});
    const picks = d.tickers.filter(t => ['STRONG BUY','BUY','ACUMULAR'].includes(t.reco)).slice(0,4);
    const target = root.querySelector('.rb-mc-picks');
    if (picks.length === 0) { target.innerHTML = '<div style="color:#9ca3af;font-size:11px;text-align:center;padding:8px 0;">sem picks de compra agora</div>'; return; }
    target.innerHTML = picks.map(t => {
      const arrow = t.change_pct_1d >= 0 ? '▲' : '▼';
      const chgColor = t.change_pct_1d >= 0 ? '#4ade80' : '#ef4444';
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 8px;background:rgba(74,222,128,0.06);border-radius:6px;border-left:2px solid #4ade80;">
        <div><span style="font-family:ui-monospace,Menlo,monospace;font-weight:800;color:#fff;font-size:12px;">${t.symbol}</span> <span style="font-size:9px;color:#9ca3af;">${t.nome.slice(0,18)}</span></div>
        <div style="font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#fff;">$${t.price} <span style="color:${chgColor};font-size:9px;">${arrow}${Math.abs(t.change_pct_1d).toFixed(1)}%</span></div>
      </div>`;
    }).join('');
  } catch(e) {
    const root = document.querySelector('.rb-mini-carteira');
    if (root) root.querySelector('.rb-mc-picks').innerHTML = '<div style="color:#ef4444;font-size:10px;text-align:center;">offline</div>';
  }
})();
</script>
<!-- /WIDGET: mini-carteira -->
