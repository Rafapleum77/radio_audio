<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitadict GeekMagic TV & Tetris</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 110px;
            text-transform: uppercase;
        }

        /* HEADER E TICKER */
        .terminal-header { position: fixed; top: 0; width: 100%; background: #000; border-bottom: 2px solid #00ff41; padding: 10px 0; text-align: center; z-index: 1000; }
        .ticker-wrap { position: fixed; top: 50px; width: 100%; background: #111; overflow: hidden; padding: 10px 0; border-bottom: 1px solid #333; z-index: 999; }
        .ticker { display: inline-block; white-space: nowrap; animation: ticker 30s linear infinite; font-size: 18px; color: #ffcc00; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* LAYOUT LADO A LADO */
        .main-container { display: flex; gap: 20px; width: 95%; max-width: 1200px; justify-content: center; }
        
        /* PAINEL DE DADOS */
        .data-column { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .data-box { background: #0a0a0a; border: 1px solid #00ff41; padding: 12px; border-radius: 5px; box-shadow: inset 0 0 10px #00ff4133; }
        .data-box h3 { margin: 0 0 8px 0; font-size: 12px; color: #fff; border-bottom: 1px solid #333; }
        .stat { display: flex; justify-content: space-between; font-size: 16px; margin: 4px 0; }
        .label { color: #888; }

        /* JOGO TETRIS */
        .tetris-column { background: #000; border: 2px solid #00ff41; padding: 10px; border-radius: 10px; position: relative; }
        canvas { background-color: #000; display: block; border: 1px solid #333; }
        .tetris-info { text-align: center; margin-top: 10px; color: #ff0000; font-weight: bold; }

        /* PLAYER */
        .player-card { grid-column: span 2; background: #111; border: 2px solid #00ff41; padding: 20px; text-align: center; margin-top: 20px; width: 100%; box-sizing: border-box; }
        .handle { font-size: 30px; font-weight: 900; color: #00ff41; display: block; margin-bottom: 15px; }
        audio { width: 100%; filter: invert(1) hue-rotate(90deg); }
        .btn-donate { background: transparent; color: #00ff41; border: 1px solid #00ff41; padding: 8px 15px; text-decoration: none; display: inline-block; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="terminal-header">BITADICT TERMINAL // GEEKMAGIC TV // SOBERANIA</div>

    <div class="ticker-wrap">
        <div class="ticker" id="main-ticker">CONECTANDO AO MERCADO GLOBAL...</div>
    </div>

    <div class="main-container">
        <div class="data-column">
            <div class="data-box">
                <h3>CRYPTO</h3>
                <div class="stat"><span class="label">BTC:</span> <span id="val-btc">...</span></div>
                <div class="stat"><span class="label">ETH:</span> <span id="val-eth">...</span></div>
                <div class="stat"><span class="label">XRP:</span> <span id="val-xrp">...</span></div>
            </div>
            <div class="data-box">
                <h3>COMMODITIES</h3>
                <div class="stat"><span class="label">OURO:</span> <span id="val-gold">...</span></div>
                <div class="stat"><span class="label">PETRÓLEO:</span> <span id="val-oil">...</span></div>
            </div>
            <div class="data-box">
                <h3>TECH STOCKS</h3>
                <div class="stat"><span class="label">GOOGLE:</span> <span id="val-google">...</span></div>
                <div class="stat"><span class="label">AMAZON:</span> <span id="val-amazon">...</span></div>
            </div>
            <div class="player-card">
                <span class="handle">@BITADICT</span>
                <audio controls><source src="noticias.mp3" type="audio/mpeg"></audio>
                <a href="https://getalby.com/p/texugorecords" target="_blank" class="btn-donate">⚡ APOIAR RÁDIO</a>
            </div>
        </div>

        <div class="tetris-column">
            <canvas id="tetris" width="240" height="400"></canvas>
            <div class="tetris-info">SCORE: <span id="score">0</span></div>
            <p style="font-size: 10px; color: #444; text-align: center;">SETAS PARA MOVER</p>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO DAS COTAÇÕES ---
        const API_KEY = '24726f0f21444fc187039e3725941475'; 
        const symbols = "BTC/USD,ETH/USD,XRP/USD,XAU/USD,WTI/USD,GOOGL,AMZN";

        async function updateData() {
            try {
                const response = await fetch(`https://api.twelvedata.com/price?symbol=${symbols}&apikey=${API_KEY}`);
                const data = await response.json();
                
                if(data.code) return; // Evita erro se exceder limite da API

                document.getElementById('val-btc').innerText = `$${parseFloat(data['BTC/USD'].price).toLocaleString()}`;
                document.getElementById('val-eth').innerText = `$${parseFloat(data['ETH/USD'].price).toLocaleString()}`;
                document.getElementById('val-xrp').innerText = `$${parseFloat(data['XRP/USD'].price).toLocaleString()}`;
                document.getElementById('val-gold').innerText = `$${parseFloat(data['XAU/USD'].price).toLocaleString()}`;
                document.getElementById('val-oil').innerText = `$${parseFloat(data['WTI/USD'].price).toLocaleString()}`;
                document.getElementById('val-google').innerText = `$${parseFloat(data.GOOGL.price).toLocaleString()}`;
                document.getElementById('val-amazon').innerText = `$${parseFloat(data.AMZN.price).toLocaleString()}`;

                document.getElementById('main-ticker').innerHTML = `<span>BITCOIN: $${data['BTC/USD'].price}</span> <span>GOLD: $${data['XAU/USD'].price}</span> <span>CRUDE OIL: $${data['WTI/USD'].price}</span>`;
            } catch (e) {}
        }
        updateData(); setInterval(updateData, 60000);

        // --- LÓGICA DO TETRIS (VERDE E VERMELHO) ---
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        context.scale(20, 20);

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2;
            }
            scoreElement.innerText = player.score;
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        function createPiece(type) {
            if (type === 'T') return [[0, 0, 0], [1, 1, 1], [0, 1, 0]];
            if (type === 'O') return [[2, 2], [2, 2]];
            if (type === 'L') return [[0, 1, 0], [0, 1, 0], [0, 1, 1]];
            if (type === 'J') return [[0, 2, 0], [0, 2, 0], [2, 2, 0]];
            if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
            if (type === 'S') return [[0, 2, 2], [2, 2, 0], [0, 0, 0]];
            if (type === 'Z') return [[1, 1, 0], [0, 1, 1], [0, 0, 0]];
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = value === 1 ? '#00ff41' : '#ff0000'; // VERDE ou VERMELHO
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                scoreElement.innerText = 0;
            }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();
            draw();
            requestAnimationFrame(update);
        }

        const arena = createMatrix(12, 20);
        const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

        document.addEventListener('keydown', event => {
            if (event.keyCode === 37) playerMove(-1);
            else if (event.keyCode === 39) playerMove(1);
            else if (event.keyCode === 40) playerDrop();
            else if (event.keyCode === 38) playerRotate(1);
        });

        playerReset();
        update();
    </script>
</body>
</html>
