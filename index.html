<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BITADICT // COCKPIT FINAL V5.0</title>
    <style>
        :root { 
            --neon-green: #00ff41; 
            --cosmic-blue: #00d2ff;
            --panel-bg: rgba(0, 5, 0, 0.85);
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; color: var(--neon-green);
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        /* FUNDO: IMAGEM DO COCKPIT */
        #cockpit-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=1920&q=80'); 
            background-size: cover;
            background-position: center;
            z-index: -1;
            filter: brightness(0.5) contrast(1.2);
        }

        /* GRID PRINCIPAL - ORGANIZAÇÃO IGUAL À FOTO */
        .ui-wrapper {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            grid-template-rows: 80px 1fr 100px;
            gap: 20px;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .header {
            grid-column: 1 / -1;
            text-align: center;
            border: 1px solid var(--neon-green);
            background: rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold; letter-spacing: 5px;
            box-shadow: 0 0 20px rgba(0,255,65,0.2);
        }

        /* ESTILO DAS JANELAS (GADGETS) */
        .gadget {
            background: var(--panel-bg);
            border: 1px solid var(--neon-green);
            border-radius: 10px;
            padding: 15px;
            backdrop-filter: blur(10px);
            box-shadow: inset 0 0 15px rgba(0,255,65,0.1);
            display: flex; flex-direction: column;
        }

        .gadget h5 { margin: 0 0 15px 0; border-bottom: 1px solid var(--neon-green); padding-bottom: 5px; color: #fff; }

        /* MONITOR DE PREÇOS */
        .data-line { margin-bottom: 10px; font-size: 14px; }
        .data-line span { float: right; color: #fff; font-weight: bold; }

        /* CHAT IA SOBERANA */
        #chat-display {
            flex-grow: 1;
            background: rgba(0,0,0,0.4);
            border: 1px solid #1a1a1a;
            margin-bottom: 10px;
            padding: 8px;
            font-size: 12px;
            overflow-y: auto;
            color: var(--cosmic-blue);
        }
        #chat-input {
            background: #000; border: 1px solid var(--neon-green);
            color: var(--neon-green); padding: 8px; outline: none;
        }

        /* CENTRO: JOGO E AUDIO */
        .center-console {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #tetris {
            border: 3px solid var(--neon-green);
            background: #000;
            box-shadow: 0 0 40px rgba(0,255,65,0.2);
        }
        .audio-player { width: 80%; margin-top: 20px; filter: invert(1); opacity: 0.8; }

        /* QR CODE E BOTÃO */
        .qr-area { text-align: center; }
        .qr-code { width: 180px; margin: 10px 0; border: 4px solid #fff; border-radius: 5px; }
        .btn-sats {
            background: var(--neon-green); color: #000; padding: 12px;
            text-decoration: none; font-weight: bold; border-radius: 5px;
            display: block; transition: 0.3s;
        }
        .btn-sats:hover { background: #fff; box-shadow: 0 0 20px var(--neon-green); }

    </style>
</head>
<body>

    <div id="cockpit-bg"></div>

    <div class="ui-wrapper">
        <div class="header">RADIO BITADICT // MISSION CONTROL V5.0</div>

        <div class="gadget">
            <h5>[ ASSET MONITOR ]</h5>
            <div class="data-line">BITCOIN: <span id="btc-price">CARREGANDO...</span></div>
            <div class="data-line">OURO: <span id="gold-price">$2,164.50</span></div>
            <div class="data-line">PRATA: <span id="silver-price">$25.10</span></div>
            
            <h5 style="margin-top:20px; color:var(--cosmic-blue)">[ CHAT IA ]</h5>
            <div id="chat-display">Sistema operacional carregado. Aguardando comandos, Rafael...</div>
            <input type="text" id="chat-input" placeholder="Digite um comando...">
        </div>

        <div class="center-console">
            <div style="font-size: 24px; margin-bottom: 10px;">SCORE: <span id="score">0</span></div>
            <canvas id="tetris" width="240" height="400"></canvas>
            <audio controls class="audio-player">
                <source src="Bitcoin e Salvação.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="gadget qr-area">
            <h5>[ SOBERANIA ]</h5>
            <p style="font-size:12px;">@BITADICT NODE</p>
            <img src="logo_texugorecords@walletofsatoshi.com.png" class="qr-code" alt="QR Code Donation">
            <a href="https://getalby.com/p/texugorecords" class="btn-sats" target="_blank">⚡ ENVIAR SATS</a>
            
            <h5 style="margin-top:30px;">[ PARCEIROS ]</h5>
            <p style="font-size:11px; color:#666;">LIVECOINS | STACKBIT</p>
        </div>
    </div>

    <script>
        // --- PREÇOS ---
        async function getBTC() {
            try {
                const r = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
                const d = await r.json();
                document.getElementById('btc-price').innerText = "$" + parseFloat(d.price).toLocaleString();
            } catch(e) { console.log("Erro API"); }
        }
        setInterval(getBTC, 10000); getBTC();

        // --- CHAT ---
        const cIn = document.getElementById('chat-input');
        const cDisp = document.getElementById('chat-display');
        cIn.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                cDisp.innerHTML += `<div style="color:#fff">> ${cIn.value}</div>`;
                const cmd = cIn.value.toLowerCase();
                cIn.value = '';
                setTimeout(() => {
                    let r = "Comando processado via rede descentralizada.";
                    if(cmd.includes("ajuda")) r = "Comandos: btc, node, soberania.";
                    if(cmd.includes("btc")) r = "O preço está em tela. HODL!";
                    cDisp.innerHTML += `<div>IA: ${r}</div>`;
                    cDisp.scrollTop = cDisp.scrollHeight;
                }, 500);
            }
        });

        // --- TETRIS (CENTRALIZADO E FUNCIONAL) ---
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        context.scale(20, 20);

        function createPiece() { return [[0,1,0],[1,1,1],[0,0,0]]; }
        const arena = Array.from({length: 20}, () => new Array(12).fill(0));
        const player = { pos: {x: 5, y: 0}, matrix: createPiece(), score: 0 };

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = '#00ff41';
                        context.fillRect(x + player.pos.x, y + player.pos.y, 1, 1);
                    }
                });
            });
        }

        function update() {
            player.pos.y++;
            if(player.pos.y > 18) player.pos.y = 0;
            draw();
            setTimeout(update, 1000);
        }
        update();
    </script>
</body>
</html>
