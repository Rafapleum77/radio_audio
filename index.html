<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Radio Bitadict - LIVE</title>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding-top: 80px; }
        .ticker-wrap { position: fixed; top: 0; width: 100%; overflow: hidden; background: #121212; border-bottom: 2px solid #1DB954; padding: 10px 0; z-index: 1000; }
        .ticker { display: inline-block; white-space: nowrap; animation: ticker 20s linear infinite; font-weight: bold; font-size: 20px; color: #1DB954; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .ticker span { margin-right: 50px; }
        .partners { display: flex; gap: 30px; margin: 20px 0; align-items: center; }
        .partner-logo { height: 50px; border-radius: 8px; }
        .player-card { background: #181818; padding: 30px; border-radius: 20px; text-align: center; width: 400px; border: 1px solid #333; }
        .profile-pic { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #1DB954; margin-bottom: 10px; }
        .handle { display: block; font-size: 28px; font-weight: bold; color: #1DB954; margin-bottom: 20px; }
        .qr-area { background: white; padding: 10px; border-radius: 10px; margin-top: 20px; display: inline-block; }
        .btn-donate { background: #F7931A; color: black; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; display: block; margin: 10px 0; }
        audio { width: 100%; filter: invert(100%); }
    </style>
</head>
<body>

    <div class="ticker-wrap">
        <div class="ticker">
            <span id="btc">BTC: Carregando...</span>
            <span>LIVECOINS & STACKBIT: PARCEIROS OFICIAIS</span>
            <span>@BITADICT - RÁDIO BITCOIN</span>
        </div>
    </div>

    <div class="partners">
        <img src="image_40415f.png" class="partner-logo">
        <img src="Captura de ecrã 2026-03-18 234933.jpg" class="partner-logo">
    </div>

    <div class="player-card">
        <img src="banner_bitadict_brutal.png" class="profile-pic">
        <span class="handle">@bitadict</span>
        
        <audio controls autoplay loop><source src="noticias.mp3" type="audio/mpeg"></audio>

        <a href="https://getalby.com/p/texugorecords" class="btn-donate">⚡ DOAR VIA ALBY</a>

        <div class="qr-area">
            <p style="color:black; font-size:10px; margin:0; font-weight:bold;">SCAN WOS</p>
            <img src="logo_texugorecords@walletofsatoshi.com.png" width="150">
        </div>
    </div>

    <script>
        async function fetchPrice() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
                const data = await res.json();
                document.getElementById('btc').innerText = "BITCOIN: $" + parseFloat(data.price).toLocaleString();
            } catch(e) {}
        }
        fetchPrice(); setInterval(fetchPrice, 30000);
    </script>
</body>
</html>
