<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Bitadict - No Ar</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .player-card {
            background: linear-gradient(180deg, #282828 0%, #121212 100%);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 380px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        /* Container do Carrossel */
        .carousel {
            width: 100%;
            height: 380px;
            position: relative;
            margin-bottom: 20px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        .carousel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        .carousel img.active {
            opacity: 1;
        }
        h1 { font-size: 24px; margin: 10px 0 5px; color: #1DB954; }
        p { color: #b3b3b3; font-size: 14px; margin-bottom: 25px; }
        audio {
            width: 100%;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5);
        }
        .status {
            display: inline-block;
            background: #1db954;
            color: black;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="player-card">
        <div class="carousel" id="carousel">
            <img src="banner_bitadict_brutal.png" class="active">
            <img src="radio_bitadict.jpg">
        </div>
        
        <h1>Radio Bitadict</h1>
        <p>Inteligência Artificial minerando sua mente</p>

        <audio controls autoplay>
            <source src="noticias.mp3" type="audio/mpeg">
        </audio>

        <div class="status">● AO VIVO</div>
    </div>

    <script>
        const images = document.querySelectorAll('#carousel img');
        let currentIndex = 0;

        function showNextImage() {
            images[currentIndex].classList.remove('active');
            currentIndex = (currentIndex + 1) % images.length;
            images[currentIndex].classList.add('active');
        }

        // Troca a imagem a cada 5 segundos
        setInterval(showNextImage, 5000);
    </script>
</body>
</html>
