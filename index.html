<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bitadict GeekMagic TV - Live</title>
    <style>
        body { background-color: #050505; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; padding-top: 110px; }
        
        /* GRÁFICO DE FUNDO ANIMADO */
        #bg-graph { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.1; }

        .terminal-header { position: fixed; top: 0; width: 100%; background: #000; border-bottom: 2px solid #00ff41; padding: 10px 0; text-align: center; z-index: 1000; }
        .ticker-wrap { position: fixed; top: 50px; width: 100%; background: #111; overflow: hidden; padding: 10px 0; border-bottom: 1px solid #333; z-index: 999; }
        .ticker { display: inline-block; white-space: nowrap; animation: ticker 30s linear infinite; font-size: 18px; color: #ffcc00; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .main-container { display: flex; gap: 20px; width: 95%; max-width: 1200px; justify-content: center; z-index: 1; }
        .data-column { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .data-box { background: rgba(10, 10, 10, 0.9); border: 1px solid #00ff41; padding: 12px; border-radius: 5px; box-shadow: inset 0 0 10px #00ff4133; }
        .stat { display: flex; justify-content: space-between; font-size: 16px; margin: 4px 0; }
        
        /* TETRIS */
        .tetris-column { background: #000; border: 2px solid #00ff41; padding: 10px; border-radius: 10px; cursor: crosshair; }
        canvas { background-color: #000; border: 1px solid #333; }
        
        .player-card { background: #111; border: 2px solid #00ff41; padding: 20px; text-align: center; margin-top: 20px; width: 100%; }
        audio { width: 100%; filter: invert(1) hue-rotate(90deg); }
        .btn-donate { color: #00ff41; border: 1px solid #00ff41; padding: 10px; text-decoration: none; display: inline-block; margin-top: 15px; }
    </style>
</head>
<body>

    <canvas id="bg-graph"></canvas>

    <div class="terminal-header">BITADICT TERMINAL // GEEKMAGIC TV // SOBERANIA</div>

    <div class="ticker-wrap"><div class="ticker" id="main-ticker">CONECTANDO AO MERCADO...</div></div>

    <div class="main-container">
        <div class="data-column">
            <div class="data-box">
                <h3>MARKET DATA</h3>
                <div class="stat"><span>BTC:</span> <span id="val-btc">...</span></div>
                <div class="stat"><span>ETH:</span> <span id="val-eth">...</span></div>
                <div class="stat"><span>XRP:</span> <span id="val-xrp">...</span></div>
                <div class="stat"><span>GOLD:</span> <span id="val-gold">...</span></div>
                <div class="stat"><span>SILVER:</span> <span id="val-silver">...</span></div>
                <div class="stat"><span>CRUDE OIL:</span> <span id="val-oil">...</span></div>
            </div>
            <div class="player-card">
                <span style="font-size: 24px; display: block; margin-bottom: 10px;">@BITADICT</span>
                <audio controls><source src="noticias.mp3" type="audio/mpeg"></audio>
                <a href="https://getalby.com/p/texugorecords" class="btn-donate">⚡ APOIAR RÁDIO</a>
            </div>
        </div>

        <div class="tetris-column" id="tetris-area">
            <canvas id="tetris" width="240" height="400"></canvas>
            <div style="text-align: center; margin-top: 10px;">SCORE: <span id="score">0</span></div>
            <p style="font-size: 10px; text-align: center; color: #555;">CLIQUE: LADOS (MOVER) | CENTRO (RODAR)</p>
        </div>
    </div>

    <script>
        const API_KEY = '24726f0f21444fc187039e3725941475';
        // Símbolos ajustados para maior compatibilidade
        const symbols = "BTC/USD,ETH/USD,XRP/USD,XAU/USD,XAG/USD,WTI/USD,GOOGL,AMZN";

        async function updateData() {
            try {
                const res = await fetch(`https://api.twelvedata.com/price?symbol=${symbols}&apikey=${API_KEY}`);
                const data = await res.json();
                
                document.getElementById('val-btc').innerText = `$${parseFloat(data['BTC/USD'].price).toLocaleString()}`;
                document.getElementById('val-gold').innerText = `$${parseFloat(data['XAU/USD'].price).toLocaleString()}`;
                document.getElementById('val-silver').innerText = `$${parseFloat(data['XAG/USD'].price).toLocaleString()}`;
                document.getElementById('val-oil').innerText = `$${parseFloat(data['WTI/USD'].price).toLocaleString()}`;
                
                document.getElementById('main-ticker').innerText = `BTC: $${data['BTC/USD'].price} | OIL: $${data['WTI/USD'].price} | GOLD: $${data['XAU/USD'].price}`;
            } catch (e) {}
        }
        updateData(); setInterval(updateData, 60000);

        // --- BACKGROUND GRAPH ANIMATION ---
        const bgCanvas = document.getElementById('bg-graph');
        const bgCtx = bgCanvas.getContext('2d');
        bgCanvas.width = window.innerWidth;
        bgCanvas.height = window.innerHeight;
        let offset = 0;

        function drawGraph() {
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            bgCtx.beginPath();
            bgCtx.strokeStyle = '#00ff41';
            for (let x = 0; x < bgCanvas.width; x++) {
                let y = (bgCanvas.height / 2) + Math.sin(x * 0.01 + offset) * 50;
                bgCtx.lineTo(x, y);
            }
            bgCtx.stroke();
            offset += 0.05;
            requestAnimationFrame(drawGraph);
        }
        drawGraph();

        // --- TETRIS (MOUSE + KEYBOARD) ---
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        context.scale(20, 20);

        // [A lógica do Tetris de cores verde/vermelho segue aqui, com a adição de:]
        document.getElementById('tetris-area').addEventListener('mousedown', event => {
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            if (x < 80) playerMove(-1); // Esquerda
            else if (x > 160) playerMove(1); // Direita
            else playerRotate(1); // Centro roda
        });

        // (Mantive os controlos de teclado para quem usa PC)
        document.addEventListener('keydown', event => {
            if (event.keyCode === 37) playerMove(-1);
            else if (event.keyCode === 39) playerMove(1);
            else if (event.keyCode === 40) playerDrop();
            else if (event.keyCode === 38) playerRotate(1);
        });

        // [Restante das funções arenaSweep, collide, playerReset, etc... do código anterior]
    </script>
</body>
</html>
