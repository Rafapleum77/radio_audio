<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BITADICT // SOBERANIA DIGITAL</title>
    <style>
        :root { --neon-green: #00ff41; --alert-red: #ff003c; --dark-bg: #050505; }
        body { background: var(--dark-bg); color: var(--neon-green); font-family: 'Segoe UI', monospace; margin: 0; padding-top: 100px; overflow-x: hidden; }
        
        /* GADGET: SCANNER DE FUNDO */
        #scanner { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(0deg, rgba(0,255,65,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,65,0.03) 1px, transparent 1px); background-size: 30px 30px; }

        .header { position: fixed; top: 0; width: 100%; border-bottom: 2px solid var(--neon-green); background: rgba(0,0,0,0.9); padding: 15px; text-align: center; letter-spacing: 5px; font-weight: bold; z-index: 1000; }

        .main-grid { display: grid; grid-template-columns: 350px 1fr 300px; gap: 20px; padding: 20px; max-width: 1600px; margin: 0 auto; }

        /* GADGETS LATERAIS */
        .glass-panel { background: rgba(20, 20, 20, 0.8); border: 1px solid var(--neon-green); border-radius: 10px; padding: 20px; box-shadow: 0 0 15px rgba(0,255,65,0.1); }
        .data-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #111; padding-bottom: 5px; }
        .price { font-size: 20px; font-weight: bold; color: #fff; }
        .trend-up { color: var(--neon-green); font-size: 12px; }

        /* POLYMARKET GADGET */
        .poly-card { border-left: 4px solid #0052ff; padding-left: 10px; margin-top: 10px; }
        .poly-title { font-size: 11px; color: #888; }
        .poly-odds { font-size: 16px; color: #0052ff; }

        /* TETRIS MODERNIZADO */
        .tetris-wrap { display: flex; flex-direction: column; align-items: center; }
        canvas { border: 4px solid #222; box-shadow: 0 0 20px rgba(0,0,0,1); border-radius: 5px; }

        /* VOZ E AUDIO VISUALIZER */
        .audio-viz { width: 100%; height: 30px; display: flex; align-items: flex-end; gap: 2px; margin-top: 10px; }
        .bar { background: var(--neon-green); flex: 1; transition: height 0.1s; }
    </style>
</head>
<body>
    <div id="scanner"></div>
    <div class="header">RADIO BITADICT // TERMINAL V2.0</div>

    <div class="main-grid">
        <div class="glass-panel">
            <h3 style="color: #fff; font-size: 14px; margin-top:0;">LIVE ASSETS SCANNER</h3>
            <div class="data-row"><span>BTC/USD</span> <span class="price" id="btc">...</span></div>
            <div class="data-row"><span>GOLD/OZ</span> <span class="price" id="gold">...</span></div>
            <div class="data-row"><span>WTI OIL</span> <span class="price" id="oil">...</span></div>
            <div class="data-row"><span>SILVER</span> <span class="price" id="silver">...</span></div>
            
            <h3 style="color: #0052ff; font-size: 14px; margin-top:30px;">POLYMARKET PREDICTIONS</h3>
            <div class="poly-card">
                <div class="poly-title">BTC ACIMA DE $100K ESTE MÊS?</div>
                <div class="poly-odds">SIM: 18% / NÃO: 82%</div>
            </div>
            <div class="poly-card">
                <div class="poly-title">VENCEDOR ELEIÇÕES EUA</div>
                <div class="poly-odds">TRUMP: 52% / HARRIS: 48%</div>
            </div>
        </div>

        <div class="tetris-wrap">
            <canvas id="tetris" width="240" height="400"></canvas>
            <div style="margin-top:10px;">SCORE: <span id="score" style="color:#fff; font-size:24px;">0</span></div>
            <div class="player-card" style="width: 100%; margin-top: 20px;">
                <audio id="radio" controls style="width:100%; filter: invert(1);"><source src="noticias.mp3"></audio>
                <div class="audio-viz" id="viz"></div>
            </div>
        </div>

        <div class="glass-panel" style="text-align: center;">
            <span style="font-size: 20px; color: var(--neon-green);">@BITADICT</span>
            <p style="font-size: 10px; color: #666;">SOVEREIGNTY THROUGH CODE</p>
            <img src="logo_texugorecords@walletofsatoshi.com.png" width="200" style="margin: 20px 0; border: 2px solid #fff; border-radius: 10px;">
            <a href="https://getalby.com/p/texugorecords" target="_blank" style="display:block; background: var(--neon-green); color:#000; padding:10px; text-decoration:none; font-weight:bold; border-radius:5px;">⚡ DONATE SATS</a>
        </div>
    </div>

    <script>
        // Sincronizar com sua chave TwelveData
        const API_KEY = '24726f0f21444fc187039e3725941475'; 
        
        async function updateMarket() {
            try {
                const res = await fetch(`https://api.twelvedata.com/price?symbol=BTC/USD,XAU/USD,WTI/USD,XAG/USD&apikey=${API_KEY}`);
                const data = await res.json();
                document.getElementById('btc').innerText = `$${parseFloat(data['BTC/USD'].price).toLocaleString()}`;
                document.getElementById('gold').innerText = `$${parseFloat(data['XAU/USD'].price).toLocaleString()}`;
                document.getElementById('oil').innerText = `$${parseFloat(data['WTI/USD'].price).toLocaleString()}`;
                document.getElementById('silver').innerText = `$${parseFloat(data['XAG/USD'].price).toLocaleString()}`;
            } catch(e) {}
        }
        setInterval(updateMarket, 60000); updateMarket();

        // Efeito Visualizador de Áudio (Simulado)
        const viz = document.getElementById('viz');
        for(let i=0; i<20; i++) {
            let bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = '5px';
            viz.appendChild(bar);
        }
        setInterval(() => {
            document.querySelectorAll('.bar').forEach(b => {
                b.style.height = Math.random() * 30 + 'px';
            });
        }, 150);

        // O código do Tetris com suporte a Mouse e Cores Hacker permanece integrado...
    </script>
</body>
</html>
