<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Bitadict - LIVE</title>
    <style>
        body {
            /* NOVO FUNDO BRUTALISTA */
            background-color: #080808; /* Preto profundo */
            background-image: linear-gradient(rgba(18, 18, 18, 0.8), rgba(18, 18, 18, 0.95)), 
                              url('fundo_brutal.png'); /* Sua nova imagem */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding-top: 100px; /* Espaço para a esteira */
        }

        /* ESTEIRA DE COTAÇÕES (TICKER) */
        .ticker-wrap {
            position: fixed;
            top: 0;
            width: 100%;
            overflow: hidden;
            background-color: rgba(18, 18, 18, 0.9);
            border-bottom: 2px solid #1DB954;
            padding: 15px 0;
            z-index: 1000;
        }
        .ticker {
            display: inline-block;
            white-space: nowrap;
            animation: ticker 25s linear infinite;
            font-weight: bold;
            font-size: 22px;
            color: #1DB954;
        }
        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .ticker span { margin-right: 60px; }

        /* HEADER E PARCEIROS */
        .header-section { text-align: center; margin-bottom: 30px; }
        .partners-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-top: 15px;
            background-color: rgba(18, 18, 18, 0.8);
            padding: 15px;
            border-radius: 50px;
            border: 1px solid #333;
        }
        .partner-logo { height: 50px; transition: transform 0.3s; }
        .partner-logo:hover { transform: scale(1.1); }

        /* CARD PRINCIPAL */
        .player-card {
            background: rgba(24, 24, 24, 0.95);
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            width: 500px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            border: 1px solid #333;
            backdrop-filter: blur(5px);
        }

        /* PERFIL EM DESTAQUE */
        .profile-area { margin-bottom: 25px; }
        .profile-pic {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid #1DB954;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(29, 185, 84, 0.4);
        }
        .handle {
            display: block;
            font-size: 36px;
            font-weight: bold;
            color: #1DB954;
            margin-top: 15px;
        }

        /* CARROSSEL */
        .carousel {
            width: 100%;
            height: 400px;
            position: relative;
            margin: 25px 0;
            border-radius: 15px;
            overflow: hidden;
        }
        .carousel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0; left: 0;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
        }
        .carousel img.active { opacity: 1; }

        /* BOTÃO DONATE LIGHTNING */
        .btn-donate {
            background-color: #F7931A; /* Laranja Bitcoin */
            color: #000;
            text-decoration: none;
            padding: 18px 35px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 20px;
            display: inline-block;
            margin-top: 30px;
            text-transform: uppercase;
            box-shadow: 6px 6px 0px #000;
            transition: 0.1s;
        }
        .btn-donate:hover { 
            transform: translate(3px, 3px); 
            box-shadow: 3px 3px 0px #000;
            background-color: #ffaa45;
        }

        h1 { font-size: 38px; margin: 10px 0; color: #fff; }
        p { color: #b3b3b3; font-size: 20px; margin-bottom: 30px; }
        audio { width: 100%; filter: invert(100%); margin-top: 25px; }
    </style>
</head>
<body>

    <div class="ticker-wrap">
        <div class="ticker">
            <span id="btc-price">BITCOIN: CARREGANDO...</span>
            <span id="eth-price">ETHEREUM: CARREGANDO...</span>
            <span>LIVE COINS & STACK BIT: PARCEIROS DA SOBERANIA DIGITAL ₿</span>
            <span>RADIO BITADICT: A VOZ DA REVOLUÇÃO</span>
        </div>
    </div>

    <div class="header-section">
        <div class="partners-bar">
            <img src="logo_livecoins.png" alt="Live Coins" class="partner-logo">
            <img src="logo_stackbit.png" alt="Stack Bit" class="partner-logo">
        </div>
    </div>

    <div class="player-card">
        <div class="profile-area">
            <img src="perfil.png" alt="Rafael Rios @bitadict" class="profile-pic">
            <span class="handle">@bitadict</span>
        </div>

        <div class="carousel" id="carousel">
            <img src="banner_bitadict_brutal.png" class="active">
            <img src="image_429943.jpg">
            <img src="trump_001.png">
        </div>
        
        <audio controls autoplay loop>
            <source src="noticias.mp3" type="audio/mpeg">
        </audio>

        <a href="https://getalby.com/p/texugorecords" target="_blank" class="btn-donate">
            ⚡ APOIE A RÁDIO (DONATE)
        </a>
    </div>

    <script>
        // Lógica do Carrossel
        const images = document.querySelectorAll('#carousel img');
        let index = 0;
        setInterval(() => {
            if (images.length > 0) {
                images[index].classList.remove('active');
                index = (index + 1) % images.length;
                images[index].classList.add('active');
            }
        }, 5000);

        // Busca Preços Reais
        async function getPrices() {
            try {
                const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbols=["BTCUSDT","ETHUSDT"]');
                const data = await response.json();
                document.getElementById('btc-price').innerText = `BITCOIN: $${parseFloat(data[0].price).toLocaleString()}`;
                document.getElementById('eth-price').innerText = `ETHEREUM: $${parseFloat(data[1].price).toLocaleString()}`;
            } catch (e) {}
        }
        getPrices();
        setInterval(getPrices, 30000);
    </script>
</body>
</html>
