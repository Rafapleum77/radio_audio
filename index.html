<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BITADICT // TERMINAL V3.0</title>
    <style>
        :root { 
            --neon-green: #00ff41; 
            --neon-blue: #00d2ff;
            --dark-bg: #050505; 
            --panel-bg: rgba(10, 10, 10, 0.98);
        }
        
        body { 
            background: var(--dark-bg); 
            color: var(--neon-green); 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            padding-top: 90px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            overflow-x: hidden;
        }

        #bg-grid { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; 
            background: linear-gradient(0deg, rgba(0,255,65,0.03) 1px, transparent 1px), 
                        linear-gradient(90deg, rgba(0,255,65,0.03) 1px, transparent 1px); 
            background-size: 50px 50px; 
        }

        .header { 
            position: fixed; top: 0; width: 100%; 
            border-bottom: 3px solid var(--neon-green); 
            background: rgba(0,0,0,0.95); 
            padding: 20px; text-align: center; 
            letter-spacing: 6px; z-index: 1000; 
            font-size: 22px;
            font-weight: bold;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
        }

        .main-grid { 
            display: grid; 
            grid-template-columns: 350px 1fr 350px; 
            gap: 30px; 
            width: 98%; 
            max-width: 1800px; 
            padding: 20px;
        }

        .glass-panel { 
            background: var(--panel-bg); 
            border: 2px solid var(--neon-green); 
            border-radius: 8px; 
            padding: 25px; 
            box-shadow: 0 0 20px rgba(0,255,65,0.1);
        }

        .panel-title {
            font-size: 18px;
            text-transform: uppercase;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--neon-green);
            padding-bottom: 10px;
            color: #fff;
            display: block;
        }

        /* FONTES MAIORES NOS ATIVOS */
        .section-label { color: var(--neon-blue); font-size: 14px; margin: 20px 0 10px 0; font-weight: bold;}
        .data-row { 
            display: flex; justify-content: space-between; 
            margin-bottom: 15px; padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 5px;
            font-size: 18px; /* Fonte aumentada */
        }
        .price { color: #fff; font-weight: bold; }

        /* TETRIS CENTER */
        .tetris-container { display: flex; flex-direction: column; align-items: center; }
        #tetris { 
            border: 4px solid var(--neon-green); 
            background: #000; 
            box-shadow: 0 0 50px rgba(0,255,65,0.15);
        }
        .score-board { font-size: 32px; margin-bottom: 15px; color: #fff; }

        /* POLYMARKET */
        .poly-card { 
            border-left: 4px solid var(--neon-blue); 
            background: rgba(0, 210, 255, 0.1); 
            padding: 15px; margin-bottom: 15px;
            font-size: 16px;
        }

        .btn-donate { 
            display: block; background: var(--neon-green); color: #000; 
            padding: 20px; text-align: center; text-decoration: none; 
            font-weight: bold; font-size: 18px; margin-top: 25px; 
            transition: all 0.2s ease;
        }
        .btn-donate:hover { background: #fff; transform: scale(1.02); }

        audio { width: 100%; filter: invert(1) hue-rotate(85deg) contrast(1.2); margin-top: 15px; }
    </style>
</head>
<body>
    <div id="bg-grid"></div>
    <div class="header">RADIO BITADICT // TERMINAL V3.0 // SOBERANIA DIGITAL</div>

    <div class="main-grid">
        <div class="glass-panel">
            <span class="panel-title">Asset Scanner</span>
            
            <div class="section-label">CRYPTOCURRENCY</div>
            <div class="data-row"><span>BTC/USD</span> <span class="price" id="btc-val">00,000</span></div>
            
            <div class="section-label
