        /* --- MOLDURA DA CABINE (Z-INDEX ALTO) --- */
        #cockpit-frame {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 25px solid var(--cockpit-metal);
            box-sizing: border-box;
            box-shadow: inset 0 0 80px rgba(0,0,0,1), 0 0 100px rgba(0,255,65,0.15);
            background: 
                linear-gradient(135deg, #2a2a2e 25%, transparent 25%) -50px 0,
                linear-gradient(225deg, #2a2a2e 25%, transparent 25%) -50px 0,
                linear-gradient(315deg, #2a2a2e 25%, transparent 25%),
                linear-gradient(45deg, #2a2a2e 25%, transparent 25%);
            background-size: 100px 100px;
            z-index: 50; /* Garante que fica na frente das janelas, mas permite cliques */
            pointer-events: none;
        }
