<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BITADICT // TERMINAL V2.0</title>
    <style>
        :root { --neon-green: #00ff41; --dark-bg: #050505; }
        body { background: var(--dark-bg); color: var(--neon-green); font-family: 'Courier New', monospace; margin: 0; padding-top: 100px; display: flex; flex-direction: column; align-items: center; }
        
        /* EFEITO MATRIX NO FUNDO */
        #scanner { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(0deg, rgba(0,255,65,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,65,0.03) 1px, transparent 1px); background-size: 30px 30px; }

        .header { position: fixed; top: 0; width: 100%; border-bottom: 2px solid var(--neon-green); background: rgba(0,0,0,0.9); padding: 15px; text-align: center; letter-spacing: 5px; z-index: 1000; font-weight: bold; }

        .main-grid { display: grid; grid-template-columns: 320px 1fr 320px; gap: 20px; width: 95%; max-width: 1400px; }

        .glass-panel { background: rgba(15, 15, 15, 0.9); border: 1px solid var(--neon-green); border-radius: 10px; padding: 20px; box-shadow: 0 0 15px rgba(0,255,65,0.1); }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .price { color: #fff; font-weight: bold; }

        /* TETRIS CENTER */
        .tetris-wrap { display: flex; flex-direction: column; align-items: center; }
        #tetris { border: 2px solid var(--neon-green); background: #000; cursor: crosshair; }

        .poly-card { border-left: 3px solid #0052ff; padding-left: 10px; margin-top: 15px; background: rgba(0, 82, 255, 0.05); padding: 5px 10px; }
        .btn-donate { display: block; background: var(--neon-green); color: #000; padding: 12px; text-align: center; text-decoration: none; font-weight: bold; margin-top: 20px; border-radius: 5px; }
        
        audio { width: 100%; filter: invert(1) hue-rotate(90deg); margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">RADIO BITADICT // TERMINAL V2.0 // SOBERANIA DIGITAL</div>

        </div>

    <script>
        // CONFIGURAÇÃO DA API TWELVE DATA
        const API_KEY = '24726f0f21444fc187039e3725941475'; 
        const symbols = "BTC/USD,XAU/USD,WTI/USD,XAG/USD";

                if(data['BTC/USD']) {
                    document.getElementById('btc-val').innerText = "$" + parseFloat(data['BTC/USD'].price).toLocaleString();
                    document.getElementById('gold-val').innerText = "$" + parseFloat(data['XAU/USD'].price).toLocaleString();
                    document.getElementById('oil-val').innerText = "$" + parseFloat(data['WTI/USD'].price).toLocaleString();
                    document.getElementById('silver-val').innerText = "$" + parseFloat(data['XAG/USD'].price).toLocaleString();

            if (type === 'I') return [[0, 2, 0, 0], [0, 2, 0, 0], [0, 2, 0, 0], [0, 2, 0, 0]];
            if (type === 'S') return [[0, 1, 1], [1, 1, 0], [0, 0, 0]];
            return [[2, 2, 0], [0, 2, 2], [0, 0, 0]];
        }

            drawMatrix(player.matrix, player.pos);
        }
