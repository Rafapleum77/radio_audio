<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rádio Cabina Astronauta</title>
    <style>
        body {
            background: radial-gradient(circle at 60% 40%, #181a23 60%, #000 100%);
            color: #00ff41;
            font-family: 'Orbitron', monospace;
            margin: 0;
            min-height: 100vh;
            overflow: hidden;
        }
        .cabina {
            position: relative;
            width: 1200px;
            height: 700px;
            margin: 40px auto;
            background: linear-gradient(135deg, #222 60%, #181a23 100%);
            border-radius: 40px;
            box-shadow: 0 0 80px #00ff41a0, 0 0 120px #000 inset;
            border: 4px solid #00ff41;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }
        .janela-terra {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 420px;
            height: 220px;
            background: rgba(0,0,0,0.8);
            border: 3px solid #00d4ff;
            border-radius: 32px;
            box-shadow: 0 0 40px #00d4ffa0;
            overflow: hidden;
            z-index: 2;
        }
        .terra {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #00d4ff 60%, #181a23 100%);
            border-radius: 50%;
            box-shadow: 0 0 60px #00d4ffb0, 0 0 120px #181a23 inset;
        }
        .gadgets {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 32px;
            z-index: 3;
        }
        .gadget {
            background: linear-gradient(135deg, #181a23 60%, #00ff41 100%);
            border: 2px solid #00ff41;
            border-radius: 18px;
            box-shadow: 0 0 18px #00ff41a0;
            padding: 24px 32px;
            min-width: 180px;
            min-height: 120px;
            color: #fff;
            font-size: 1.1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .painel-radio {
            position: absolute;
            top: 320px;
            left: 80px;
            width: 320px;
            height: 180px;
            background: linear-gradient(135deg, #00ff41 60%, #181a23 100%);
            border-radius: 18px;
            box-shadow: 0 0 24px #00ff41a0;
            border: 2px solid #00ff41;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 4;
        }
        .painel-radio button {
            background: #00ff41;
            color: #181a23;
            border: none;
            border-radius: 8px;
            padding: 16px 32px;
            font-size: 1.2rem;
            font-family: 'Orbitron', monospace;
            cursor: pointer;
            box-shadow: 0 0 12px #00ff41a0;
            margin-top: 12px;
        }
        .painel-radio h3 {
            color: #181a23;
            margin: 0;
            font-size: 1.4rem;
            font-weight: bold;
        }
        .painel-tetris {
            position: absolute;
            top: 320px;
            right: 80px;
            width: 320px;
            height: 180px;
            background: linear-gradient(135deg, #a000f0 60%, #181a23 100%);
            border-radius: 18px;
            box-shadow: 0 0 24px #a000f0a0;
            border: 2px solid #a000f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 4;
        }
        .painel-tetris h3 {
            color: #fff;
            margin: 0;
            font-size: 1.4rem;
            font-weight: bold;
        }
        .painel-tetris canvas {
            border: 2px solid #fff;
            background: #000;
            margin-top: 12px;
        }
        .painel-bitcoin {
            position: absolute;
            top: 540px;
            left: 50%;
            transform: translateX(-50%);
            width: 420px;
            height: 180px;
            background: linear-gradient(135deg, #f0a000 60%, #181a23 100%);
            border-radius: 18px;
            box-shadow: 0 0 24px #f0a000a0;
            border: 2px solid #f0a000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 4;
        }
        .painel-bitcoin h3 {
            color: #fff;
            margin: 0;
            font-size: 1.4rem;
            font-weight: bold;
        }
        .painel-bitcoin canvas {
            border: 2px solid #fff;
            background: #000;
            margin-top: 12px;
        }
        .cabina-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(90deg,#00ff41 0%,#181a23 100%);
            border-radius: 40px 40px 0 0;
            box-shadow: 0 0 32px #00ff41a0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .cabina-header h1 {
            color: #fff;
            font-size: 2.8rem;
            font-family: 'Orbitron', monospace;
            margin: 0;
            letter-spacing: 4px;
            text-shadow: 0 0 18px #00ff41a0;
        }
        .cabina-header span {
            color: #00ff41;
            font-size: 1.2rem;
            margin-left: 24px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="cabina">
        <div class="cabina-header">
            <h1>RÁDIO BITCOIN</h1>
            <span>A voz da revolução digital</span>
        </div>
        <div class="janela-terra">
            <div class="terra"></div>
        </div>
        <div class="gadgets">
            <div class="gadget">Relógio<br><span id="clockGadget">00:00:00</span></div>
            <div class="gadget">DJ Gadget<br><button id="playRadioBtn">🔊 Ouvir Rádio Rock</button></div>
            <div class="gadget">Agente IA<br><button id="askAgent">🤖 Chamar Agente IA</button></div>
        </div>
        <div class="painel-radio">
            <h3>Rádio IA</h3>
            <button id="playIA">🔊 Ouvir Rádio IA</button>
        </div>
        <div class="painel-tetris">
            <h3>Tetris</h3>
            <canvas id="tetris" width="120" height="120"></canvas>
        </div>
        <div class="painel-bitcoin">
            <h3>Gráfico Bitcoin</h3>
            <canvas id="btcChart" width="220" height="120"></canvas>
        </div>
    </div>
    <script>
        // Relógio digital
        function updateClock() {
            const now = new Date();
            const h = now.getHours().toString().padStart(2,'0');
            const m = now.getMinutes().toString().padStart(2,'0');
            const s = now.getSeconds().toString().padStart(2,'0');
            document.getElementById('clockGadget').textContent = `${h}:${m}:${s}`;
        }
        setInterval(updateClock, 1000); updateClock();
        // DJ Gadget
        document.getElementById('playRadioBtn').onclick = function() {
            alert('Rádio Rock tocando ao vivo!');
        };
        // Agente IA
        document.getElementById('askAgent').onclick = function() {
            alert('Agente IA: Dica do dia - Compartilhe sua rádio, interaja com a comunidade e fique atento às tendências do Bitcoin!');
        };
        // Rádio IA
        document.getElementById('playIA').onclick = function() {
            alert('Rádio IA falando...');
        };
        // Tetris (mock)
        const tetrisCanvas = document.getElementById('tetris');
        const tetrisCtx = tetrisCanvas.getContext('2d');
        tetrisCtx.fillStyle = '#00ff41';
        tetrisCtx.fillRect(40, 40, 40, 40);
        // Bitcoin Chart (mock)
        const btcCanvas = document.getElementById('btcChart');
        const btcCtx = btcCanvas.getContext('2d');
        btcCtx.strokeStyle = '#f0a000';
        btcCtx.beginPath();
        btcCtx.moveTo(10, 110);
        btcCtx.lineTo(60, 60);
        btcCtx.lineTo(110, 80);
        btcCtx.lineTo(210, 30);
        btcCtx.stroke();
        btcCtx.fillStyle = '#f0a000';
        btcCtx.beginPath();
        btcCtx.arc(210, 30, 8, 0, 2*Math.PI);
        btcCtx.fill();
    </script>
</body>
</html>
